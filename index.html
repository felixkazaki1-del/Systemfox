
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Hub</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

<header class="topbar">
<h1>🌸 System Hub</h1>

<div class="toolbar">
<input id="searchBar" placeholder="Search alters...">
<button onclick="toggleSort()">A→Z</button>
<button onclick="toggleTheme()">🌙 Theme</button>
<button onclick="toggleDashboard()">📊 Dashboard</button>
<button onclick="openAdd()">➕ Add Alter</button>
<button onclick="exportData()">💾 Export</button>
<button onclick="importData()">📂 Import</button>
</div>

</header>

<!-- DASHBOARD -->
<section id="dashboard" class="dashboard">

<h2>Fronting</h2>

<div class="frontSection">
<h3>Currently Fronting</h3>
<div id="frontNow"></div>
<input id="frontStatus" placeholder="Custom system status">
<button onclick="setStatus()">Set Status</button>
<p id="statusText"></p>
</div>

<div class="frontSection">
<h3>Add Alter To Front</h3>
<select id="frontSelect"></select>
<button onclick="addFront()">Front</button>
</div>

<div class="frontSection">
<h3>Fronting History</h3>
<div id="frontHistory"></div>
</div>

</section>

<main id="groupsContainer"></main>

<!-- PROFILE MODAL -->
<div id="alterModal" class="modal">
<div id="modalCard" class="modalCard">

<span class="close" onclick="closeModal()">×</span>

<div class="profileHeader">
<img id="modalAvatar">
<h2 id="modalName"></h2>
</div>

<div id="modalBio"></div>

<p id="modalFront"></p>

<button onclick="editAlter()">Edit</button>
<button onclick="deleteAlter()">Delete</button>

</div>
</div>

<!-- ADD / EDIT ALTER -->
<div id="addModal" class="modal">
<div class="modalCard">

<h2 id="formTitle">Add Alter</h2>

<input id="nameInput" placeholder="Name">

<textarea id="bioInput" placeholder="Bio (Markdown supported)"></textarea>

<label>Avatar</label>
<input type="file" id="avatarInput" accept="image/*">

<label>Colour</label>
<input type="color" id="colorInput">

<input id="groupInput" placeholder="Group">

<input id="frontPercent" type="number" placeholder="Front %">

<button onclick="saveAlter()">Save</button>

</div>
</div>

<script src="script.js"></script>

</body>
</html>
